version: "3.9"

# NOTE: Docker is not installed on this machine by default.
# See README.md for native-run instructions.
# This file is provided for environments where Docker + nvidia-container-toolkit
# are available.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6382}:6379"
    command: redis-server --port 6379
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_PORT=${BACKEND_PORT:-8082}
      - FRONTEND_PORT=${FRONTEND_PORT:-3009}
      - DATA_DIR=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker:
    build:
      context: ./backend
    command: python3 -m arq app.worker.settings.WorkerSettings
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
